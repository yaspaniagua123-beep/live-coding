services:
  # Servicio del Backend (Node.js, Python, PHP...)
  api:
    build: ./backend
    ports:
      - "3000:3000"  # Mapea el puerto 3000 del contenedor al 3000 de tu PC
    volumes:
      - ./backend:/app # Sincroniza tu código para ver cambios en vivo
    environment:
      - NODE_ENV=production

  # Servicio del Frontend (Servidor web sencillo)
  web:
    image: nginx:alpine
    ports:
      - "8080:80"    # Entrarás a tu app desde http://localhost:8080
    volumes:
      - ./frontend:/usr/share/nginx/html # Sirve tus archivos HTML/JS