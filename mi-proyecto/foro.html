<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Foro</title>
<style>
    body {
        margin: 0;
        font-family: Arial, Helvetica, sans-serif;
        background: linear-gradient(135deg, #667eea, #764ba2);
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }
    .contorno {
        background: white;
        padding: 30px;
        border-radius: 15px;
        width: 400px;
    }
    textarea,button{
        width: 100%;
        padding: 10px;
        margin: 8px 0;
        border-radius: 8px;
        border: 1px solid #ccc;
    }
    button{
        background: #667eea;
        color: white;
        border: none;
        cursor: pointer;
    }
    button:hover{
        background: #764ba2;
    }
    .muro{
    margin-top:10px;
    max-height:200px;
    overflow-y:auto;
    background:#f8f9fc;
    padding:10px;
    border-radius:8px;
    }

    .mensaje{
    background:white;
    padding:6px;
    margin-bottom:5px;
    border-radius:6px;
    }
    a{
        text-decoration: none;
        color: inherit;
    }
</style>
<body>
    <div class="contorno">
        <h2>Muro Público</h2>
        <p id="bienvenida">Bienvenidos!!</p>
        <textarea id="mensaje" placeholder="Escribe un mensaje..."></textarea>
        <button onclick="publicar()">Publicar</button>
        <a href="login.html"><button onclick="cerrar()">Cerrar Sesión</button></a>
        <div class="muro" id="muro"></div>
    </div>
<script src="script.js"></script>
</body>
</head>
